<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haha nice try</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ddd;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
        }

        .message {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2rem;
        }

        .link {
            color: #666;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.15s;
        }

        .link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="message">haha nice try</p>
        <a href="./index.html" class="link">← go back</a>
    </div>
</body>
</html>
